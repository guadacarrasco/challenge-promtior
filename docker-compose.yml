

services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - VECTOR_STORE_PATH=/app/chroma_data
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/chroma_data
    command: >
      bash -c "
        python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    command: npm start

volumes:
  backend_data:

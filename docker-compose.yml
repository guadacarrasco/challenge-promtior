

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  backend:
    build:
      context: .
      target: backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:1b
      - VECTOR_STORE_PATH=/app/chroma_data
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/chroma_data
    depends_on:
      - ollama
    command: >
      bash -c "
        echo 'Waiting for Ollama to be ready...' &&
        sleep 10 &&
        python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    command: npm start

volumes:
  ollama_data:
  backend_data:
